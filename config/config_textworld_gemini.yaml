agent:
  params:
    memory_type: fade_enriched_history

    fade_enriched_history:
      trigger_match: text
      trigger_text_threshold: 0.55
      max_conflict_llm_candidates: 8
      priming_interval: 6
      tag_batch_interval: 12
      fusion_interval: 12
      theta_fusion: 0.82
      t_window: 10

env:
  invalid_action_mode: fallback

eval:
  seed: 0
  num_episodes: 10
  max_steps_per_episode: 80
  out_json: runs_tw_gemini/rollout.jsonl

llm:
  name: gemini-2.5-flash-lite
  provider: gemini
  temperature: 0
  timeout: 180.0