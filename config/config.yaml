env:
  name: "BabyAI-MixedTrainLocal-v0"
  gym_kwargs:
    num_dists: 0
  invalid_action_mode: "fallback"
  fallback_action: "go forward"

eval:
  seed: 0
  num_episodes: 2
  max_steps_per_episode: 15
  out_json: "runs/rollout.jsonl"

agent:
  type: "memory"

memory:
  enabled: true
  path: "data/memory.jsonl"
  retrieval_top_k: 3
  write_during_eval: true

openai_model:
  name: "gpt-4o-mini"
  temperature: 1.0
  timeout: 120.0
