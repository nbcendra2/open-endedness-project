env:
  name: "BabyAI-MixedTrainLocal-v0/goto"
  gym_kwargs:
    num_dists: 0
  invalid_action_mode: "fallback"
  fallback_action: "turn left"

eval:
  seed: 0
  num_episodes: 2
  max_steps_per_episode: 5
  out_json: "runs/rollout.jsonl"

agent:
  name: "base"  # memory, base, random
  params:
    memory_path: "data/memory11.jsonl"
    retrieval_top_k: 3
    retriever: "embedding"  # lexical, embedding
    stuck_window: 3
    reflection: true
    planning: true

openai_model:
  name: "gpt-4o-mini"
  temperature: 1.0
  timeout: 120.0
