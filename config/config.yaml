agent:
  name: base
  params:
    memory_path: data/memory.jsonl
    memory_type: reflection
    planning: true
    reflection: true
    retrieval_top_k: 3
    retriever: embedding
    stuck_window: 3
env:
  fallback_action: turn left
  gym_kwargs:
    num_dists: 1
  invalid_action_mode: fallback
  name: BabyAI-MixedTrainLocal-v0/pickup
eval:
  max_steps_per_episode: 20
  num_episodes: 5
  out_json: runs/rollout.jsonl
  seed: 0
llm:
  name: deepseek-chat
  provider: deepseek
  temperature: 0
  timeout: 120.0
